<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Visionneuse patrimoniale — Bibliothèques Douai Cuincy</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300..700;1,9..40,300..700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <style>
    /* ── Tokens ── */
    :root {
      --bg: #f5f2ec;
      --surface: #ffffff;
      --border: #ddd8ce;
      --text: #1a1714;
      --text-muted: #6b6560;
      --accent: #8b3a1e;
      --accent-light: #f0e8e3;
      --nav-bg: #1a1714;
      --nav-text: #f5f2ec;
      --radius: 6px;
      --shadow: 0 2px 12px rgba(0,0,0,.10);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Layout ── */
    .viewer-layout {
      display: grid;
      grid-template-columns: 320px 1fr;
      height: calc(100vh);
    }

    /* ── Sidebar ── */
    .sidebar {
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .sidebar-header {
      padding: 1.25rem 1.25rem 1rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-header h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 1.1rem;
      color: var(--accent);
      margin-bottom: .25rem;
    }
    .sidebar-header p {
      font-size: .75rem;
      color: var(--text-muted);
    }
    .sidebar-search {
      padding: .75rem 1.25rem;
      border-bottom: 1px solid var(--border);
    }
    .sidebar-search input {
      width: 100%;
      padding: .45rem .7rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-family: inherit;
      font-size: .8rem;
      background: var(--bg);
      color: var(--text);
      outline: none;
    }
    .sidebar-search input:focus { border-color: var(--accent); }

    /* ── Arborescence ── */
    .tree {
      overflow-y: auto;
      flex: 1;
      padding: .5rem 0;
    }
    .tree-loading, .tree-error {
      padding: 1.5rem 1.25rem;
      font-size: .8rem;
      color: var(--text-muted);
      text-align: center;
      line-height: 1.6;
    }
    .tree-error {
      color: var(--accent);
    }
    .tree-error code {
      display: block;
      margin-top: .5rem;
      padding: .4rem .6rem;
      background: var(--accent-light);
      border-radius: 4px;
      font-size: .72rem;
      word-break: break-all;
    }

    /* Nœuds de l'arbre */
    .tree-node { user-select: none; }
    .tree-node-header {
      display: flex;
      align-items: center;
      gap: .4rem;
      padding: .45rem .75rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      font-size: .82rem;
    }
    .tree-node-header:hover { background: var(--accent-light); }
    .tree-node-header .chevron {
      width: 14px; height: 14px;
      flex-shrink: 0;
      transition: transform .2s;
      color: var(--text-muted);
    }
    .tree-node.expanded > .tree-node-header .chevron {
      transform: rotate(90deg);
    }
    .tree-node-header .folder-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      color: var(--accent);
    }
    .tree-node-header .label {
      flex: 1;
      white-space: normal;
      overflow: hidden;
      text-overflow: ellipsis;
      font-weight: 500;
    }
    .tree-node-header .count {
      font-size: .7rem;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    /* Niveaux d'indentation */
    .tree-node[data-depth="0"] > .tree-node-header { padding-left: .75rem; }
    .tree-node[data-depth="1"] > .tree-node-header { padding-left: 1.75rem; }
    .tree-node[data-depth="2"] > .tree-node-header { padding-left: 2.75rem; }
    .tree-node[data-depth="3"] > .tree-node-header { padding-left: 3.75rem; }

    /* Fonds racine en plus gras */
    .tree-node[data-depth="0"] > .tree-node-header {
      font-family: 'DM Serif Display', serif;
      font-size: .95rem;
      color: var(--accent);
    }
    .tree-node[data-depth="0"] > .tree-node-header .folder-icon {
      width: 18px; height: 18px;
    }

    .tree-node-children {
      display: none;
    }
    .tree-node.expanded > .tree-node-children {
      display: block;
    }

    /* Items image (feuilles) */
    .tree-item {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .4rem .75rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      font-size: .76rem;
    }
    .tree-item:hover { background: var(--accent-light); }
    .tree-item.active {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }
    .tree-item[data-depth="1"] { padding-left: 1.75rem; }
    .tree-item[data-depth="2"] { padding-left: 2.75rem; }
    .tree-item[data-depth="3"] { padding-left: 3.75rem; }
    .tree-item[data-depth="4"] { padding-left: 4.75rem; }

    .item-thumb {
      width: 36px; height: 36px;
      border-radius: 3px;
      object-fit: cover;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
    }
    .item-thumb-placeholder {
      width: 36px; height: 36px;
      border-radius: 3px;
      border: 1px solid var(--border);
      flex-shrink: 0;
      background: var(--bg);
      display: grid; place-items: center;
      font-size: .6rem;
      color: var(--text-muted);
    }
    .item-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    /* ── Item livre ── */
    .tree-book {
      display: flex;
      align-items: center;
      gap: .65rem;
      padding: .45rem .75rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
      font-size: .82rem;
      font-weight: 500;
    }
    .tree-book:hover { background: var(--accent-light); }
    .tree-book.active {
      background: var(--accent-light);
      border-left-color: var(--accent);
    }
    .tree-book[data-depth="1"] { padding-left: 1.75rem; }
    .tree-book[data-depth="2"] { padding-left: 2.75rem; }
    .tree-book[data-depth="3"] { padding-left: 3.75rem; }
    .tree-book[data-depth="4"] { padding-left: 4.75rem; }
    .tree-book .book-icon {
      width: 16px; height: 16px;
      flex-shrink: 0;
      color: var(--accent);
    }
    .tree-book .book-name {
      min-width: 0;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .tree-book .book-count {
      font-size: .7rem;
      color: var(--text-muted);
      flex-shrink: 0;
      font-weight: 400;
    }
    .book-count {
      min-width: 15px;
    }
    /* Sous-items étiquetés d'un livre */
    .tree-book-wrapper {
      display: block;
    }
    .tree-book-pages {
      display: none;
    }
    .tree-book-wrapper.expanded .tree-book-pages {
      display: block;
    }
    .tree-book-page {
      display: flex;
      align-items: center;
      gap: .5rem;
      font-size: .75rem;
      color: var(--text-muted);
      padding: .35rem .75rem;
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .15s, border-color .15s;
    }
    .tree-book-page:hover { background: var(--accent-light); color: var(--text); }
    .tree-book-page.active { background: var(--accent-light); border-left-color: var(--accent); color: var(--text); }
    .tree-book-page[data-depth="1"] { padding-left: 2.25rem; }
    .tree-book-page[data-depth="2"] { padding-left: 3.25rem; }
    .tree-book-page[data-depth="3"] { padding-left: 4.25rem; }
    .tree-book-page[data-depth="4"] { padding-left: 5.25rem; }
    .tree-book-page svg { flex-shrink: 0; opacity: .5; }
    .tree-book-page .page-label {
      min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: normal;
    }
    /* Compteur spécial pour les livres */
    .viewer-counter.book-mode {
      background: rgba(139, 58, 30, 0.75);
    }

    .sidebar-footer {
      padding: .75rem 1.25rem;
      border-top: 1px solid var(--border);
      font-size: .72rem;
      color: var(--text-muted);
    }

    /* ── Viewer ── */
    .viewer-main {
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .viewer-toolbar {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: .6rem 1.25rem;
      display: flex;
      align-items: center;
      gap: .5rem;
      flex-wrap: wrap;
    }
    .toolbar-group {
      display: flex;
      align-items: center;
      gap: .35rem;
      padding-right: .75rem;
      border-right: 1px solid var(--border);
    }
    .toolbar-group:last-child { border-right: none; padding-right: 0; }

    .tb-btn {
      display: flex;
      align-items: center;
      gap: .35rem;
      padding: .35rem .65rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg);
      color: var(--text);
      font-family: inherit;
      font-size: .78rem;
      cursor: pointer;
      transition: background .15s, border-color .15s;
      white-space: nowrap;
    }
    .tb-btn:hover:not(:disabled) { background: var(--accent-light); border-color: var(--accent); }
    .tb-btn:disabled { opacity: .4; cursor: default; }
    .tb-btn svg { flex-shrink: 0; }

    .tb-zoom-val {
      font-size: .78rem;
      min-width: 3.5rem;
      text-align: center;
      color: var(--text-muted);
    }

    .viewer-filename {
      margin-left: auto;
      font-size: .78rem;
      color: var(--text-muted);
      font-style: italic;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 280px;
    }

    .viewer-canvas {
      flex: 1;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #2a2724;
      position: relative;
      cursor: grab;
    }
    .viewer-canvas:active { cursor: grabbing; }

    .viewer-img-wrap {
      position: absolute;
      display: inline-block;
      transform-origin: center center;
      will-change: transform;
    }

    .viewer-img {
      display: block;
      max-width: none;
      box-shadow: 0 8px 40px rgba(0,0,0,.5);
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    .viewer-empty {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1rem;
      color: #6b6560;
      text-align: center;
      padding: 2rem;
    }
    .viewer-empty svg { opacity: .3; }
    .viewer-empty h3 { font-family: 'DM Serif Display', serif; font-size: 1.3rem; color: #9a9490; }
    .viewer-empty p { font-size: .85rem; max-width: 320px; line-height: 1.6; }

    /* Nav images prev/next */
    .nav-arrow {
      position: absolute;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,.12);
      border: none;
      color: white;
      width: 40px; height: 60px;
      border-radius: 4px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: background .15s;
      z-index: 10;
    }
    .nav-arrow:hover:not(:disabled) { background: rgba(255,255,255,.25); }
    .nav-arrow.prev { left: .75rem; }
    .nav-arrow.next { right: .75rem; }
    .nav-arrow:disabled { opacity: .2; cursor: default; }

    .viewer-counter {
      position: absolute;
      bottom: .75rem;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(0,0,0,.5);
      color: white;
      font-size: .75rem;
      padding: .3rem .75rem;
      border-radius: 20px;
    }

    /* Loader image */
    .viewer-loading {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(255,255,255,.7);
      font-size: .85rem;
      display: none;
    }
    .viewer-loading.active { display: block; }

    /* Breadcrumb dans le viewer */
    .viewer-path {
      position: absolute;
      top: .75rem;
      left: .75rem;
      background: rgba(0,0,0,.5);
      color: rgba(255,255,255,.85);
      font-size: .72rem;
      padding: .3rem .65rem;
      border-radius: 20px;
      max-width: calc(100% - 1.5rem);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* ── Responsive ── */
    @media (max-width: 700px) {
      .viewer-layout { grid-template-columns: 1fr; }
      .sidebar { max-height: 280px; border-right: none; border-bottom: 1px solid var(--border); }
    }
  </style>
</head>
<body>

<div class="viewer-layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="sidebar-header">
      <h2>Documents numérisés</h2>
      <p>Parcourez les fonds par boîte</p>
    </div>

    <div class="sidebar-search">
      <input type="text" id="searchInput" placeholder="Filtrer par nom de fichier…" aria-label="Filtrer les fichiers">
    </div>

    <div class="tree" id="tree" role="tree" aria-label="Arborescence des fonds">
      <div class="tree-loading">Chargement de l'arborescence…</div>
    </div>

    <div class="sidebar-footer" id="sidebarFooter">—</div>
  </aside>

  <!-- ── Viewer ── -->
  <main class="viewer-main">

    <div class="viewer-toolbar" role="toolbar" aria-label="Outils de visualisation">
      <div class="toolbar-group">
        <button class="tb-btn" id="btnZoomOut" title="Réduire" aria-label="Réduire">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <span class="tb-zoom-val" id="zoomVal">100 %</span>
        <button class="tb-btn" id="btnZoomIn" title="Agrandir" aria-label="Agrandir">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="11" y1="8" x2="11" y2="14"/><line x1="8" y1="11" x2="14" y2="11"/></svg>
        </button>
        <button class="tb-btn" id="btnZoomFit" title="Adapter à la fenêtre">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M8 3H5a2 2 0 00-2 2v3m18 0V5a2 2 0 00-2-2h-3m0 18h3a2 2 0 002-2v-3M3 16v3a2 2 0 002 2h3"/></svg>
          Ajuster
        </button>
        <button class="tb-btn" id="btnZoom100">100 %</button>
      </div>

      <div class="toolbar-group">
        <button class="tb-btn" id="btnRotLeft" title="Rotation 90° antihoraire" aria-label="Rotation antihoraire">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          −90°
        </button>
        <button class="tb-btn" id="btnRotRight" title="Rotation 90° horaire" aria-label="Rotation horaire">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 11-2.12-9.36L23 10"/></svg>
          +90°
        </button>
        <button class="tb-btn" id="btnRotReset" title="Réinitialiser la rotation">↺ Reset</button>
      </div>
      <span class="viewer-filename" id="viewerFilename"></span>
    </div>

    <div class="viewer-canvas" id="viewerCanvas">
      <button class="nav-arrow prev" id="arrowPrev" disabled aria-label="Image précédente">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
      <button class="nav-arrow next" id="arrowNext" disabled aria-label="Image suivante">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
      </button>

      <div class="viewer-path" id="viewerPath" style="display:none"></div>

      <div class="viewer-img-wrap" id="imgWrap" style="display:none">
        <img id="viewerImg" class="viewer-img" alt="Feuillet numérisé" draggable="false">
      </div>

      <div class="viewer-empty" id="viewerEmpty">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1"><rect x="2" y="3" width="20" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
        <h3>Sélectionnez un document</h3>
        <p>Parcourez l'arborescence des fonds dans le panneau de gauche, puis cliquez sur un feuillet pour l'afficher.</p>
      </div>

      <div class="viewer-loading" id="viewerLoading">Chargement…</div>
      <div class="viewer-counter" id="viewerCounter" style="display:none"></div>
    </div>

  </main>
</div>

<script>
  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  CONFIGURATION                                                   ║
  // ╚══════════════════════════════════════════════════════════════════╝
  // Chemin vers le manifeste JSON listant l'arborescence des images.
  // Pour la mise en ligne, il suffira de remplacer ce chemin par l'URL
  // du manifeste sur le serveur (ou un endpoint qui le génère).
  const MANIFEST_URL = 'js/manifest.json';
  // Dossier racine pour les images. Tous les chemins du manifeste
  // sont relatifs à cette racine.
  const IMAGES_ROOT  = 'https://pub-85062da5f8a7451b9c168f8b3cfd980b.r2.dev/';

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  ÉTAT                                                            ║
  // ╚══════════════════════════════════════════════════════════════════╝
  let manifest = null;        // structure hiérarchique brute
  let flatFiles = [];         // liste à plat de tous les fichiers (pour navigation préc/suiv)
  let currentIdx = -1;        // index dans flatFiles
  let currentPageIdx = 0;     // index de page courante quand l'item est un livre
  let zoom = 1, rotation = 0, panX = 0, panY = 0;

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  ÉLÉMENTS DOM                                                    ║
  // ╚══════════════════════════════════════════════════════════════════╝
  const tree           = document.getElementById('tree');
  const searchInput    = document.getElementById('searchInput');
  const sidebarFooter  = document.getElementById('sidebarFooter');
  const imgWrap        = document.getElementById('imgWrap');
  const viewerImg      = document.getElementById('viewerImg');
  const viewerEmpty    = document.getElementById('viewerEmpty');
  const viewerCanvas   = document.getElementById('viewerCanvas');
  const viewerFilename = document.getElementById('viewerFilename');
  const viewerCounter  = document.getElementById('viewerCounter');
  const viewerPath     = document.getElementById('viewerPath');
  const viewerLoading  = document.getElementById('viewerLoading');
  const zoomVal        = document.getElementById('zoomVal');
  const btnZoomIn      = document.getElementById('btnZoomIn');
  const btnZoomOut     = document.getElementById('btnZoomOut');
  const btnZoomFit     = document.getElementById('btnZoomFit');
  const btnZoom100     = document.getElementById('btnZoom100');
  const btnRotLeft     = document.getElementById('btnRotLeft');
  const btnRotRight    = document.getElementById('btnRotRight');
  const btnRotReset    = document.getElementById('btnRotReset');
  const arrowPrev      = document.getElementById('arrowPrev');
  const arrowNext      = document.getElementById('arrowNext');

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  CHARGEMENT DU MANIFESTE                                         ║
  // ╚══════════════════════════════════════════════════════════════════╝
  async function loadManifest() {
    try {
      const response = await fetch(MANIFEST_URL);
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      manifest = await response.json();
      buildFlatList();
      renderTree();
      updateFooter();
    } catch (err) {
      tree.innerHTML = `
        <div class="tree-error">
          <strong>Impossible de charger l'arborescence</strong><br>
          Vérifiez que le fichier manifeste existe à l'emplacement :
          <code>${MANIFEST_URL}</code>
          <br>Erreur : ${err.message}
          <br><br>
          <em>Astuce : si vous ouvrez ce fichier directement (file://), votre navigateur peut bloquer le chargement local. Lancez un petit serveur local (voir README).</em>
        </div>`;
      sidebarFooter.textContent = 'Erreur de chargement';
    }
  }

  // Aplatit la hiérarchie en une seule liste pour la navigation préc/suiv.
  // Un livre (type 'book') compte comme un seul item ; ses pages sont navigables en interne.
  function buildFlatList() {
    flatFiles = [];
    function walk(node, breadcrumb) {
      if (node.type === 'folder') {
        const newCrumb = [...breadcrumb, node.name];
        (node.children || []).forEach(child => walk(child, newCrumb));
      } else if (node.type === 'image') {
        flatFiles.push({
          kind: 'image',
          name: node.name,
          path: node.path,
          url:  IMAGES_ROOT + node.path,
          breadcrumb: breadcrumb.join(' / ')
        });
      } else if (node.type === 'book') {
        flatFiles.push({
          kind: 'book',
          name: node.name,
          breadcrumb: breadcrumb.join(' / '),
          path: (node.pages && node.pages[0]) ? node.pages[0].path : '',
          pages: (node.pages || []).map(p => ({
            name: p.name,
            path: p.path,
            url:  IMAGES_ROOT + p.path
          }))
        });
      }
    }
    (manifest.children || []).forEach(child => walk(child, []));
  }

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  RENDU DE L'ARBRE                                                ║
  // ╚══════════════════════════════════════════════════════════════════╝
  function renderTree(filter = '') {
    tree.innerHTML = '';
    const lc = filter.trim().toLowerCase();
    const hasFilter = lc.length > 0;

    (manifest.children || []).forEach(rootNode => {
      const el = renderNode(rootNode, 0, lc);
      if (el) tree.appendChild(el);
    });

    // Si filtre actif, déplier automatiquement tous les nœuds parents
    // pour rendre visibles les résultats.
    if (hasFilter) {
      tree.querySelectorAll('.tree-node').forEach(n => n.classList.add('expanded'));
    }

    if (tree.children.length === 0) {
      tree.innerHTML = '<div class="tree-loading">Aucun résultat.</div>';
    }
  }

  // Crée récursivement un élément DOM pour un nœud.
  // Renvoie null si le nœud (et ses descendants) ne correspond pas au filtre.
  function renderNode(node, depth, filter) {
    if (node.type === 'image') {
      if (filter && !node.name.toLowerCase().includes(filter)) return null;
      return renderImageItem(node, depth);
    }
    if (node.type === 'book') {
      if (filter && !node.name.toLowerCase().includes(filter)) return null;
      return renderBookItem(node, depth);
    }

    // Dossier : on construit d'abord les enfants pour savoir s'il reste quelque chose à afficher
    const childrenContainer = document.createElement('div');
    childrenContainer.className = 'tree-node-children';

    let kept = 0;
    (node.children || []).forEach(child => {
      const childEl = renderNode(child, depth + 1, filter);
      if (childEl) {
        childrenContainer.appendChild(childEl);
        kept++;
      }
    });

    // Si on filtre et qu'il ne reste aucun enfant ET que le dossier lui-même
    // ne contient pas le filtre dans son nom : on ne l'affiche pas.
    if (filter && kept === 0 && !node.name.toLowerCase().includes(filter)) {
      return null;
    }

    const nodeEl = document.createElement('div');
    nodeEl.className = 'tree-node';
    nodeEl.dataset.depth = depth;

    const header = document.createElement('div');
    header.className = 'tree-node-header';
    header.setAttribute('role', 'treeitem');
    header.tabIndex = 0;

    // Chevron
    header.innerHTML = `
      <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>
      <svg class="folder-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 7a2 2 0 0 1 2-2h4l2 2h8a2 2 0 0 1 2 2v9a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z"/></svg>
      <span class="label" title="${escapeHtml(node.name)}">${escapeHtml(node.name)}</span>
      <span class="count">${countImages(node)}</span>
    `;

    header.addEventListener('click', () => nodeEl.classList.toggle('expanded'));
    header.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); nodeEl.classList.toggle('expanded'); }
    });

    nodeEl.appendChild(header);
    nodeEl.appendChild(childrenContainer);
    return nodeEl;
  }

  function renderBookItem(node, depth) {
    const labelledPages = (node.pages || [])
      .map((p, i) => ({ ...p, pageIdx: i }))
      .filter(p => p.name);
    const hasLabels = labelledPages.length > 0;
    const flatIdx = flatFiles.findIndex(f => f.kind === 'book' && f.name === node.name);

    // Wrapper qui englobe le livre + ses sous-items étiquetés
    const wrapper = document.createElement('div');
    wrapper.className = 'tree-book-wrapper';
    if (hasLabels) wrapper.classList.add('has-labels');

    // ── Ligne principale du livre ──
    const item = document.createElement('div');
    item.className = 'tree-book';
    item.dataset.depth = depth;
    item.dataset.bookname = node.name;
    item.setAttribute('role', 'treeitem');
    item.tabIndex = 0;
    if (flatIdx === currentIdx) item.classList.add('active');

    const nbPages = (node.pages || []).length;
    const chevronSvg = hasLabels
      ? `<svg class="chevron" style="width:12px;height:12px;flex-shrink:0;transition:transform .2s;color:var(--text-muted)" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="9 18 15 12 9 6"/></svg>`
      : '';

    item.innerHTML = `
      ${chevronSvg}
      <svg class="book-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
        <path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/>
        <path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/>
      </svg>
      <span class="book-name" title="${escapeHtml(node.name)}">${escapeHtml(node.name)}</span>
      <span class="book-count">${nbPages} p.</span>
    `;

    // Clic sur le livre : ouvre page 1 ET déplie les sous-items si présents
    item.addEventListener('click', () => {
      if (hasLabels) wrapper.classList.toggle('expanded');
      if (flatIdx >= 0) openFile(flatIdx, 0);
    });
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        if (hasLabels) wrapper.classList.toggle('expanded');
        if (flatIdx >= 0) openFile(flatIdx, 0);
      }
    });

    // Rotation du chevron
    wrapper.addEventListener('transitionend', () => {});
    // (la rotation est gérée via .expanded sur le wrapper en CSS si on ajoute la règle)

    wrapper.appendChild(item);

    // ── Sous-items étiquetés ──
    if (hasLabels) {
      // Faire tourner le chevron via CSS
      const style = item.querySelector('.chevron');
      const observer = new MutationObserver(() => {
        if (style) style.style.transform = wrapper.classList.contains('expanded') ? 'rotate(90deg)' : '';
      });
      observer.observe(wrapper, { attributes: true, attributeFilter: ['class'] });

      const pagesContainer = document.createElement('div');
      pagesContainer.className = 'tree-book-pages';

      labelledPages.forEach(page => {
        const pageItem = document.createElement('div');
        pageItem.className = 'tree-book-page';
        pageItem.dataset.depth = depth;
        pageItem.dataset.bookname = node.name;
        pageItem.dataset.pageidx = page.pageIdx;
        pageItem.tabIndex = 0;
        pageItem.setAttribute('role', 'treeitem');

        // Surbrillance si page active
        if (flatIdx === currentIdx && currentPageIdx === page.pageIdx) pageItem.classList.add('active');

        pageItem.innerHTML = `
          <span class="page-label" title="${escapeHtml(page.name)}">${escapeHtml(page.name)}</span>
          <span class="book-count">p.${page.pageIdx + 1}</span>
        `;

        pageItem.addEventListener('click', () => {
          if (flatIdx >= 0) openFile(flatIdx, page.pageIdx);
        });
        pageItem.addEventListener('keydown', e => {
          if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); if (flatIdx >= 0) openFile(flatIdx, page.pageIdx); }
        });

        pagesContainer.appendChild(pageItem);
      });

      wrapper.appendChild(pagesContainer);
    }

    return wrapper;
  }

  function renderImageItem(node, depth) {
    const item = document.createElement('div');
    item.className = 'tree-item';
    item.dataset.depth = depth;
    item.dataset.path = node.path;
    item.setAttribute('role', 'treeitem');
    item.tabIndex = 0;

    const flatIdx = flatFiles.findIndex(f => f.path === node.path);
    if (flatIdx === currentIdx) item.classList.add('active');

    // Vignette (chargée paresseusement)
    const thumb = document.createElement('img');
    thumb.className = 'item-thumb';
    thumb.loading = 'lazy';
    thumb.alt = '';
    thumb.src = IMAGES_ROOT + node.path;
    thumb.onerror = () => {
      const ph = document.createElement('div');
      ph.className = 'item-thumb-placeholder';
      ph.textContent = (node.name.split('.').pop() || '?').toUpperCase().slice(0, 3);
      thumb.replaceWith(ph);
    };

    const name = document.createElement('span');
    name.className = 'item-name';
    name.title = node.name;
    name.textContent = node.name;

    item.appendChild(thumb);
    item.appendChild(name);

    item.addEventListener('click', () => openByPath(node.path));
    item.addEventListener('keydown', e => {
      if (e.key === 'Enter' || e.key === ' ') { e.preventDefault(); openByPath(node.path); }
    });

    return item;
  }

  // Compte récursivement les images/pages contenues dans un nœud
  function countImages(node) {
    if (node.type === 'image') return 1;
    if (node.type === 'book') return 1;
    return (node.children || []).reduce((sum, c) => sum + countImages(c), 0);
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"']/g, c => ({
      '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;'
    }[c]));
  }

  function updateFooter() {
    const total = flatFiles.length;
    sidebarFooter.textContent = total === 0
      ? 'Aucun document'
      : `${total} document${total > 1 ? 's' : ''} dans ${countFonds()} fonds`;
  }

  function countFonds() {
    return (manifest.children || []).filter(c => c.type === 'folder').length;
  }

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  AFFICHAGE D'UNE IMAGE                                           ║
  // ╚══════════════════════════════════════════════════════════════════╝
  function openByPath(path) {
    const idx = flatFiles.findIndex(f => f.path === path);
    if (idx >= 0) openFile(idx, 0);
  }

  // pageIdx : index de page pour les livres (ignoré pour les images)
  function openFile(idx, pageIdx) {
    if (idx < 0 || idx >= flatFiles.length) return;
    currentIdx = idx;
    zoom = 1; rotation = 0; panX = 0; panY = 0;
    const f = flatFiles[idx];

    // Résoudre l'URL et le nom à afficher selon le type
    let url, displayName;
    if (f.kind === 'book') {
      currentPageIdx = (pageIdx !== undefined) ? pageIdx : 0;
      currentPageIdx = Math.max(0, Math.min(currentPageIdx, f.pages.length - 1));
      const page = f.pages[currentPageIdx];
      url = page.url;
      displayName = f.name;
    } else {
      currentPageIdx = 0;
      url = f.url;
      displayName = f.name;
    }

    viewerImg.onload = null;
    viewerImg.src = '';
    viewerFilename.textContent = f.name;
    viewerPath.textContent = f.breadcrumb ? f.breadcrumb + ' / ' + (f.kind === 'book' ? f.pages[currentPageIdx].name : f.name) : f.name;
    viewerPath.style.display = 'block';
    imgWrap.style.display = 'inline-block';
    viewerEmpty.style.display = 'none';
    viewerCounter.style.display = 'block';
    viewerLoading.classList.add('active');

    viewerImg.onload = () => {
      viewerLoading.classList.remove('active');
      fitToView();
    };
    viewerImg.onerror = () => {
      viewerLoading.classList.remove('active');
      viewerFilename.textContent = `Erreur : ${displayName} introuvable`;
    };
    viewerImg.src = url;
    viewerImg.alt = displayName;

    if (viewerImg.complete && viewerImg.naturalWidth > 0) {
      viewerLoading.classList.remove('active');
      fitToView();
    }

    updateNav();
    updateActiveItem();
  }

  // Met à jour la surbrillance de l'item actif et défile vers lui dans l'arbre
  function updateActiveItem() {
    tree.querySelectorAll('.tree-item.active, .tree-book.active').forEach(el => el.classList.remove('active'));
    if (currentIdx < 0) return;
    const f = flatFiles[currentIdx];
    let item;
    if (f.kind === 'book') {
      // Chercher d'abord un sous-item de page actif (page étiquetée)
      const pageItem = tree.querySelector(`.tree-book-page[data-bookname="${CSS.escape(f.name)}"][data-pageidx="${currentPageIdx}"]`);
      if (pageItem) {
        pageItem.classList.add('active');
        // S'assurer que le wrapper est déplié
        const wrapper = pageItem.closest('.tree-book-wrapper');
        if (wrapper) wrapper.classList.add('expanded');
        item = pageItem;
      } else {
        item = tree.querySelector(`.tree-book[data-bookname="${CSS.escape(f.name)}"]`);
        if (item) item.classList.add('active');
      }
    } else {
      item = tree.querySelector(`.tree-item[data-path="${CSS.escape(f.path)}"]`);
      if (item) item.classList.add('active');
    }
  }

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  TRANSFORMATION (zoom / rotation / pan)                          ║
  // ╚══════════════════════════════════════════════════════════════════╝
  function applyTransform() {
    imgWrap.style.transform = `translate(${panX}px, ${panY}px) rotate(${rotation}deg) scale(${zoom})`;
    zoomVal.textContent = Math.round(zoom * 100) + ' %';
    const f = flatFiles[currentIdx];
    if (f && f.kind === 'book') {
      viewerCounter.textContent = `p. ${currentPageIdx + 1} / ${f.pages.length}`;
      viewerCounter.classList.add('book-mode');
    } else {
      viewerCounter.textContent = `${currentIdx + 1} / ${flatFiles.length}`;
      viewerCounter.classList.remove('book-mode');
    }
  }

  function updateNav() {
    const f = flatFiles[currentIdx];
    if (f && f.kind === 'book') {
      arrowPrev.disabled = currentPageIdx <= 0;
      arrowNext.disabled = currentPageIdx >= f.pages.length - 1;
    } else {
      arrowPrev.disabled = currentIdx <= 0;
      arrowNext.disabled = currentIdx >= flatFiles.length - 1;
    }
  }

  function fitToView() {
    const cw = viewerCanvas.clientWidth;
    const ch = viewerCanvas.clientHeight;
    const isRotated90 = Math.abs(rotation % 180) === 90;
    const imgW = isRotated90 ? viewerImg.naturalHeight : viewerImg.naturalWidth;
    const imgH = isRotated90 ? viewerImg.naturalWidth  : viewerImg.naturalHeight;
    if (!imgW || !imgH) return;
    zoom = Math.min((cw - 64) / imgW, (ch - 64) / imgH, 1);
    zoom = Math.max(zoom, 0.05);
    panX = 0; panY = 0;
    applyTransform();
  }

  function applyZoom(newZoom) {
    newZoom = Math.max(0.05, Math.min(newZoom, 8));
    zoom = newZoom;
    applyTransform();
  }

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  EVENT LISTENERS                                                 ║
  // ╚══════════════════════════════════════════════════════════════════╝
  btnZoomIn .addEventListener('click', () => applyZoom(zoom + 0.25));
  btnZoomOut.addEventListener('click', () => applyZoom(zoom - 0.25));
  btnZoom100.addEventListener('click', () => { zoom = 1; panX = 0; panY = 0; applyTransform(); });
  btnZoomFit.addEventListener('click', fitToView);

  btnRotLeft .addEventListener('click', () => { rotation -= 90; applyTransform(); });
  btnRotRight.addEventListener('click', () => { rotation += 90; applyTransform(); });
  btnRotReset.addEventListener('click', () => { rotation = 0; applyTransform(); });

  function goTo(delta) {
    const f = flatFiles[currentIdx];
    if (f && f.kind === 'book') {
      // Navigation entre pages du livre
      const newPage = currentPageIdx + delta;
      if (newPage >= 0 && newPage < f.pages.length) {
        openFile(currentIdx, newPage);
      }
    } else {
      // Navigation entre documents
      openFile(currentIdx + delta, 0);
    }
  }
  arrowPrev.addEventListener('click', () => goTo(-1));
  arrowNext.addEventListener('click', () => goTo(+1));

  // Zoom à la molette
  viewerCanvas.addEventListener('wheel', e => {
    if (currentIdx < 0) return;
    e.preventDefault();
    const rect = viewerCanvas.getBoundingClientRect();
    const cx = e.clientX - rect.left - rect.width  / 2;
    const cy = e.clientY - rect.top  - rect.height / 2;
    const oldZoom = zoom;
    const factor = e.deltaY < 0 ? 1.1 : 0.9;
    zoom = Math.max(0.05, Math.min(zoom * factor, 8));
    panX = cx - (cx - panX) * (zoom / oldZoom);
    panY = cy - (cy - panY) * (zoom / oldZoom);
    applyTransform();
  }, { passive: false });

  // Pan (glisser sur le canvas)
  let panning = false, panStartX = 0, panStartY = 0, panStartOffX = 0, panStartOffY = 0;
  viewerCanvas.addEventListener('mousedown', e => {
    if (e.button !== 0 || currentIdx < 0) return;
    panning = true;
    panStartX = e.clientX; panStartY = e.clientY;
    panStartOffX = panX;   panStartOffY = panY;
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!panning) return;
    panX = panStartOffX + (e.clientX - panStartX);
    panY = panStartOffY + (e.clientY - panStartY);
    applyTransform();
  });
  document.addEventListener('mouseup', () => { panning = false; });

  // Raccourcis clavier
  document.addEventListener('keydown', e => {
    if (['INPUT', 'TEXTAREA'].includes(document.activeElement.tagName)) return;
    if (e.key === 'ArrowRight') { e.preventDefault(); goTo(+1); }
    if (e.key === 'ArrowLeft')  { e.preventDefault(); goTo(-1); }
    if (e.key === '+' || e.key === '=') applyZoom(zoom + 0.25);
    if (e.key === '-') applyZoom(zoom - 0.25);
    if (e.key === 'r') { rotation += 90; applyTransform(); }
    if (e.key === 'l') { rotation -= 90; applyTransform(); }
    if (e.key === 'f') fitToView();
  });

  // Filtre de recherche (avec debounce léger)
  let searchTimer;
  searchInput.addEventListener('input', () => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => renderTree(searchInput.value), 150);
  });

  // ╔══════════════════════════════════════════════════════════════════╗
  // ║  DÉMARRAGE                                                       ║
  // ╚══════════════════════════════════════════════════════════════════╝
  loadManifest();
</script>

</body>
</html>
